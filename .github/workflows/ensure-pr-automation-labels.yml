# Runs from the pull request branch (unlike pull_request_target). Seeds labels that
# upstream Grafana defines but forks often lack, so PR automation can apply area/* labels.
# Uses the API instead of a full checkout so this usually finishes before PR automation fails,
# and re-runs failed PR automation / MT compatibility jobs if they lost the race.
name: Ensure PR automation labels

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ensure-pr-labels-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ensure-labels:
    if: github.repository != 'grafana/grafana'
    runs-on: ubuntu-latest
    steps:
      - name: Create labels from pr-commands.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/contents/.github/pr-commands.json?ref=${{ github.event.pull_request.head.sha }}" \
            --jq '.content' | tr -d '\n' | base64 -d > /tmp/pr-commands.json
          node <<'NODE' > /tmp/pr-command-labels.txt
          const cmds = require('/tmp/pr-commands.json');
          const labels = new Set();
          for (const c of cmds) {
            if (c.addLabel) {
              labels.add(c.addLabel);
            }
          }
          labels.add('no-check-mt-service-compatibility');
          console.log([...labels].sort().join('\n'));
          NODE
          while IFS= read -r name || [[ -n "${name:-}" ]]; do
            [[ -z "${name// }" ]] && continue
            gh label create "$name" \
              --repo "${{ github.repository }}" \
              --color EDEDED \
              --description 'Referenced by Grafana pr-commands automation' \
              2>/dev/null || true
          done < /tmp/pr-command-labels.txt

      - name: Add MT mixed frontend/backend exception label when needed
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" --name-only)
          has_fe=0
          has_be=0
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            case "$f" in
              public/*|packages/*|e2e/*) has_fe=1 ;;
            esac
            case "$f" in
              pkg/*|go.mod|go.sum|*.go) has_be=1 ;;
            esac
          done <<< "$files"
          if [[ "$has_fe" -eq 1 && "$has_be" -eq 1 ]]; then
            gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
              --add-label no-check-mt-service-compatibility 2>/dev/null || true
          fi

      - name: Re-run failed PR automation and MT compatibility (race recovery)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          head_sha="${{ github.event.pull_request.head.sha }}"
          for workflow in "PR automation" "MT Service Compatibility"; do
            run_id=$(gh run list --repo "${{ github.repository }}" --workflow "$workflow" \
              --branch "${{ github.head_ref }}" --commit "$head_sha" \
              --status failure --limit 5 \
              --json databaseId --jq '.[0].databaseId // empty')
            if [[ -n "$run_id" ]]; then
              gh run rerun "$run_id" --repo "${{ github.repository }}" --failed || true
            fi
          done
